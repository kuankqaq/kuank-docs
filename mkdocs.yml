site_name: 服务器必看文档
theme:
  name: material
  language: zh
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.blocks.admonition:
      types:
        - note
        - warning
        - info
        - tip
        - danger
nav:
  - 首页: index.md
  - 网站必看: website.md
  - 游戏增强:
      主页面美化: ba-menu.md
      一键安装脚本: script.md
  - 常见问题: faq.md
  - 关于: about.md
